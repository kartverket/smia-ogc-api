server:
    bind:
        host: 0.0.0.0
        port: 5000
    url: http://localhost:5000
    mimetype: application/json; charset=UTF-8
    encoding: utf-8
    gzip: false
    languages:
        - nb-NO
    cors: true
    pretty_print: true
    limits:
        default_items: 20
        max_items: 50
    map:
        url: https://cache.kartverket.no/v1/wmts/1.0.0/topo/default/webmercator/{z}/{y}/{x}.png
        attribution: '&copy; <a href="https://www.kartverket.no/">Kartverket</a>'
    admin: false

logging:
    level: ERROR
    #logfile: /tmp/pygeoapi.log

metadata:
    identification:
        title: Boplikt
        description: API for boplikt
        keywords:
            - boplikt
        keywords_type: theme
        terms_of_service: https://creativecommons.org/licenses/by/4.0/
        url: https://example.org
    license:
        name: CC-BY 4.0 license
        url: https://creativecommons.org/licenses/by/4.0/
    provider:
        name: Kartverket
        url: https://www.kartverket.no
    contact:
        name: Navn Navnesen
        email: navn@kartverket.no
        role: pointOfContact

resources:
    fylker:
        type: collection
        title: Fylke
        description: Fylker
        keywords:
            - fylke
        extents:
            spatial:
                bbox: [4.0, 57.0, 31.0, 71.5]
                crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
        providers:
            - type: feature
              name: PostgreSQL
              data:
                  host: ${DB_HOST}
                  port: ${DB_PORT:-5432}
                  dbname: ${DB_NAME:-postgres}
                  user: ${DB_USER}
                  password: ${DB_PASSWORD}
                  search_path: [kommuneinfo]
              id_field: fylkesnummer
              table: fylke
              geom_field: omrade
              properties:
                  - fylkesnummer
                  - samiskforvaltningsomrade
                  - navn_norsk
                  - navn_pri_1
                  - navn_pri_2
                  - navn_pri_3
                  - navn_pri_1_sprak
                  - navn_pri_2_sprak
                  - navn_pri_3_sprak
              crs:
                  - http://www.opengis.net/def/crs/OGC/1.3/CRS84
              storage_crs: http://www.opengis.net/def/crs/EPSG/0/4258
