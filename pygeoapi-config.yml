server:
    bind:
        host: 0.0.0.0
        port: 5000
    url: ${PYGEOAPI_URL:-http://localhost:5000}
    icon: https://www.kartverket.no/favicon.ico
    logo: https://kartverket.no/globalassets/om-kartverket/kartverkslogo/kv_logo_vertikal_positiv.png
    mimetype: application/json; charset=UTF-8
    encoding: utf-8
    gzip: false
    languages:
        - nb-NO
    cors: true
    pretty_print: true
    limits:
        default_items: 20
        max_items: 50
    map:
        url: https://cache.kartverket.no/v1/wmts/1.0.0/topo/default/webmercator/{z}/{y}/{x}.png
        attribution: '&copy; <a href="https://www.kartverket.no/">Kartverket</a>'
    admin: false

logging:
    level: INFO
    logformat: '[%(asctime)s.%(msecs)03d] {%(pathname)s:%(lineno)d} %(levelname)s - %(message)s'
    dateformat: '%Y-%m-%dT%H:%M:%S'

metadata:
    identification:
        title: Administrative Inndelinger
        description: OGC API for Administrative Inndelinger
        keywords:
            - boplikt
        keywords_type: theme
        terms_of_service: " "
        url: https://www.kartverket.no
    provider:
        name: Kartverket
        url: https://www.kartverket.no
    license:
        name: " "
        url: " "
    contact:
        name: Ingrid S Johnsrud
        email: ingrid.synnove.johnsrud@kartverket.no
        role: pointOfContact

resources:
    bopliktomraade:
        type: collection
        title: Bopliktområde
        description: Bopliktområder
        keywords:
            - boplikt
        extents:
            spatial:
                bbox: [-10.0, 57.0, 35.0, 72.0]
                crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
        providers:
            - type: feature
              name: PostgreSQL
              data:
                  host: ${DB_HOST}
                  port: ${DB_PORT:-5432}
                  dbname: ${DB_NAME:-postgres}
                  user: ${DB_USER}
                  password: ${DB_PASSWORD}
                  search_path: [kommuneinfo]
              id_field: kommunenummer
              table: bopliktomraade
              geom_field: omrade
              crs:
                  - http://www.opengis.net/def/crs/EPSG/0/25833
              storage_crs: http://www.opengis.net/def/crs/EPSG/0/25833

    bopliktskjekk-geometri:
        type: process
        processor:
            name: processes.boplikt.BopliktsjekkGeometriProcessor
