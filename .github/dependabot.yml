version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/deploy"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:59"
      timezone: "Europe/Oslo"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:59"
      timezone: "Europe/Oslo"
    allow:
      - dependency-name: "actions/*"
      - dependency-name: "github/*"
      - dependency-name: "docker/*"
      - dependency-name: "mathieudutour/*"
      - dependency-name: "astral-sh/*"
      - dependency-name: "kartverket/pharos"

  - package-ecosystem: "docker"
    directory: "/deploy"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:59"
      timezone: "Europe/Oslo"
