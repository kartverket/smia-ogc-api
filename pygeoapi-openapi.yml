                  ubebygdTomt:
                    description: "Nedsatt konsesjonsgrense for bopliktomr\xE5det gjelder\
                      \ for ubebygd tomt regulert til boligform\xE5l."
                    type: boolean
                  unntakFraSlektskapsunntak:
                    description: "Angir om det er innf\xF8rt unntak fra slektskapsunntaket."
                    type: boolean
                  usikkerAvgrensning:
                    description: "Angir hvorvidt bopliktomr\xE5dets geometriske representasjon\
